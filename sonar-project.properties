sonar.organization=yasen-pavlov
sonar.projectKey=yasen-pavlov_manifold

# Sources: the React frontend and the Rust (Tauri) backend.
sonar.sources=src,src-tauri/src

# Test code (so it isn't counted as uncovered production source or scanned for
# production-only rules). Frontend specs + the Playwright e2e suite.
sonar.tests=src,e2e
sonar.test.inclusions=src/**/*.test.js,src/**/*.test.jsx,src/**/*.test.ts,src/**/*.test.tsx,src/**/*.spec.*,e2e/**/*

# Keep generated / vendored / non-source material out of analysis.
sonar.exclusions=dist/**,node_modules/**,coverage/**,docs/**,design/**,src-tauri/target/**,src-tauri/gen/**

# Exclude the Tauri entry/bootstrap module from COVERAGE only (still analyzed for
# issues). main.rs + lib.rs wire up the runtime, register commands, and build the
# system tray + window-event handling - glue that is exercised by running the app,
# not by unit tests. The command fns are thin delegators to the fully-covered
# steam/settings/store/vdfedit/appinfo modules and stay checked by the
# command_wrappers_delegate_to_modules test.
sonar.coverage.exclusions=src-tauri/src/main.rs,src-tauri/src/lib.rs

# Coverage reports (paths relative to repo root).
# Frontend: vitest v8 -> coverage/lcov.info
# Backend:  cargo-llvm-cov -> src-tauri/lcov.info
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.rust.lcov.reportPaths=src-tauri/lcov.info
