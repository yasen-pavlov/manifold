name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }} ${{ matrix.args }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest # Intel
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-latest
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri system dependencies (Linux)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            libssl-dev \
            patchelf \
            build-essential \
            curl wget file pkg-config

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Manifold ${{ github.ref_name }}"
          releaseBody: |
            Cross-platform builds of Manifold.

            Note: Manifold's Steam integration currently targets Linux. The macOS and
            Windows builds install and launch, but library scanning/writes are Linux-only
            for now. See the README for details.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
